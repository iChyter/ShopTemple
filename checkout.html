<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Demo Catalogo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geom:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="src/public/main.css">
    <link rel="stylesheet" href="src/public/checkout/checkout.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
    <header class="checkout-header">
        <a href="carrito.html" class="icon-btn back-btn" aria-label="Volver">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <h1 class="header-title">Checkout</h1>
        <div style="width: 44px;"></div> <!-- Placeholder -->
    </header>

    <main class="checkout-container">

        <section class="checkout-section">
            <h2 class="section-title">Opciones de envío:</h2>
            <div class="options-group">
                <label class="option-card shipping-opt active">
                    <input type="radio" name="shipping" value="auto" checked>
                    <div class="opt-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div class="opt-content">
                        <strong>Detecta tu ubicación ahora</strong>
                        <span>Usar función de Google Maps</span>
                    </div>
                    <div class="opt-radio"></div>
                </label>

                <label class="option-card shipping-opt">
                    <input type="radio" name="shipping" value="manual">
                    <div class="opt-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                    </div>
                    <div class="opt-content">
                        <strong>Envía tu ubicación por WhatsApp</strong>
                        <span>Deberás compartirla manualmente en el chat</span>
                    </div>
                    <div class="opt-radio"></div>
                </label>
            </div>
        </section>

        <section class="checkout-section">
            <h2 class="section-title">Método de pago:</h2>
            <div class="options-group">
                <label class="option-card payment-opt active">
                    <input type="radio" name="payment" value="Efectivo" checked>
                    <div class="opt-icon small-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <path
                                d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zm0 2v8h16V8H4zm7 3a2 2 0 1 1 2 2 2 2 0 0 1-2-2z">
                            </path>
                        </svg>
                    </div>
                    <div class="opt-content">
                        <strong>Efectivo</strong>
                    </div>
                    <div class="opt-radio"></div>
                </label>

                <label class="option-card payment-opt">
                    <input type="radio" name="payment" value="Yape / Plin">
                    <div class="opt-icon small-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="2" y1="10" x2="22" y2="10"></line>
                        </svg>
                    </div>
                    <div class="opt-content">
                        <strong>Yape / Plin</strong>
                    </div>
                    <div class="opt-radio"></div>
                </label>
            </div>
        </section>

    </main>

    <div class="floating-checkout-box">
        <div class="floating-checkout-inner">
            <div class="floating-total-info">
                <span class="floating-total-label">Total</span>
                <span class="floating-total-price" id="checkout-total">S/ 0.00</span>
            </div>
            <button class="btn-checkout-main active" id="btn-confirm-order">Confirmar pedido</button>
        </div>
    </div>

    <!-- Overlay Modal for Location Error -->
    <div id="location-error-overlay" class="custom-modal-overlay" style="display:none;">
        <div id="location-error-modal">
            <span class="reminder-icon" style="animation:none; font-size:3.5rem;">😅</span>
            <p class="reminder-text">
                No pudimos acceder a tu ubicación.<br><br>
                Hemos cambiado tu opción a <strong style="color:var(--primary-color);">Envío manual</strong>. Por favor,
                toca <strong style="color:var(--primary-color);">confirmar pedido</strong> de nuevo.
            </p>
            <div style="display:flex; gap: 10px; margin-top:20px;">
                <button id="btn-accept-location-error"
                    style="background:var(--primary-color); color:#fff; border-radius:8px; text-decoration:none; padding:12px; margin:0; width:100%; border:none; font-weight:bold; font-size:1.05rem; cursor:pointer;">Entendido</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/public/checkout/checkout.js"></script>
</body>

</html>
