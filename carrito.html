<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - La Taberna</title>
    <link rel="icon" type="image/webp" href="assets/icons/icon.webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geom:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="src/public/main.css">
    <link rel="stylesheet" href="src/public/carrito/carrito.css">
</head>

<body>

    <header id="carrito-header">
        <a href="javascript:history.back()" class="icon-btn back-btn" aria-label="Volver">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <h1 class="header-title">Mi Carrito</h1>
        <div class="icon-btn cart-btn">
            <svg viewBox="0 0 24 24" stroke="#d8831b" stroke-width="2" fill="none" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
        </div>
    </header>

    <main id="carrito-main" class="carrito-container">

        <div id="cart-content-wrapper">
            <!-- Renderizado por carrito.js -->
        </div>

        <div class="payment-section" id="payment-section" style="display:none;">
            <span class="payment-title">Elige tu método de pago:</span>
            <div class="payment-options">
                <label class="payment-label">
                    <input type="radio" name="payment_method" value="Yape/Plin">
                    📱 Yape / Plin
                </label>
                <label class="payment-label">
                    <input type="radio" name="payment_method" value="Efectivo">
                    💵 Efectivo
                </label>
            </div>
            <span class="payment-disclaimer">ℹ️ No te preocupes, el pago se realiza al recibir o coordinar por
                WhatsApp.</span>
        </div>

    </main>

    <!-- Overlay de confirmación de WhatsApp -->
    <div id="location-reminder-view" style="display:none;">
        <div class="reminder-content">
            <span class="reminder-icon">📍</span>
            <p class="reminder-text">
                ¡Casi listo!<br>
                Por favor, comparte tu <span class="reminder-highlight">"Ubicación Actual"</span> en el chat de WhatsApp
                después de enviar el mensaje para que el delivery llegue rápido.
            </p>
            <button id="btn-confirm-whatsapp" class="checkout-btn btn-whatsapp">
                ENVIAR PEDIDO AHORA 🚀
            </button>
            <button class="close-btn" onclick="window.returnToCart()">Volver atrás</button>
        </div>
    </div>

    <!-- FLOATING CHECKOUT TOTAL -->
    <div class="floating-checkout-box" style="bottom: 0px; padding-bottom: 25px;">
        <div class="floating-checkout-inner">
            <div class="floating-total-info">
                <div class="floating-total-label">Total</div>
                <div class="floating-total-price" id="cart-total-amount">S/ 0.00</div>
            </div>
            <button id="btn-continue-checkout" class="btn-checkout-main"
                style="width: auto; padding: 14px 24px; margin: 0;">Continuar</button>
        </div>
    </div>

    <script type="module" src="src/public/carrito/carrito.js"></script>
</body>

</html>
