<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Taberna - Gestión de Packs</title>
    <link rel="icon" type="image/webp" href="../../../../assets/icons/icon.webp">

    <script type="module" src="../../admin-guard.js"></script>

    <link rel="stylesheet" href="../../../public/main.css"> 
    
    <link rel="stylesheet" href="../../auth/auth.css">
    <link rel="stylesheet" href="./list-packs.css">
    <link rel="stylesheet" href="../../modules/bottom-nav/bottom-nav.css">
</head>
<body>
    <main id="app-content" class="mobile-main-content">
        <div class="page-header">
            <h2 class="page-title">Packs y Combos</h2>
            
            <div id="pack-view-tabs" class="filter-tabs">
                <button class="tab-btn active" data-filter="active">Activos</button>
                <button class="tab-btn" data-filter="all">Todos</button>
                </div>
        </div>

        <div class="search-and-action-container">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="pack-search-input" placeholder="Buscar por nombre o ID de Pack..." class="search-input" autocomplete="off">
                </div>
            </div>
            
            <a href="../add-pack/add-pack.html" id="add-pack-btn" class="add-product-btn" aria-label="Agregar Pack">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </a>
        </div>
        
        <div id="packs-list-views" class="products-list">
            <div id="active-packs-list" class="products-grid active-view"></div>
            <div id="all-packs-list" class="products-grid"></div>
        </div>
        
        <div id="pagination-container" class="pagination-area"></div>
        
        <div id="active-empty-msg" class="empty-list-msg" style="display: none;">No hay packs activos que coincidan con la búsqueda.</div>
        <div id="all-empty-msg" class="empty-list-msg" style="display: none;">No hay packs que coincidan con la búsqueda.</div>

        <div style="height: 100px;"></div>
    </main>
    
    <div id="admin-nav-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script type="module" src="./list-packs.js"></script> 
</body>
</html>
