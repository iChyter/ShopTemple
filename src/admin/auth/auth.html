<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - La Taberna</title>
    <link rel="icon" type="image/webp" href="../../../assets/icons/icon.webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geom:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../public/main.css">
    <link rel="stylesheet" href="./auth.css">
</head>

<body>

    <div id="auth-wrapper">
        <header class="auth-header">
            <a href="javascript:history.back()" class="back-btn" aria-label="Volver">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
        </header>

        <div class="auth-card">
            <div class="auth-icon">
                <svg viewBox="0 0 24 24" fill="#16a34a" stroke="none">
                    <path
                        d="M12 2C12 7.52 16.48 12 22 12C16.48 12 12 16.48 12 22C12 16.48 7.52 12 2 12C7.52 12 12 7.52 12 2Z">
                    </path>
                </svg>
            </div>

            <h1 class="auth-title">Iniciar Sesión</h1>
            <p class="auth-subtitle">Acceso exclusivo al panel de administración</p>

            <form id="login-form" class="auth-form">
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <input type="email" id="admin-email" placeholder="Correo electrónico" required autocomplete="email">
                </div>

                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" id="admin-password" placeholder="Contraseña" required
                        autocomplete="current-password">
                    <div class="input-action toggle-password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>

                <button type="submit" id="login-btn">Ingresar</button>

                <p id="auth-error-msg" class="error-msg" style="display: none;"></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script type="module">
        import { handleLoginSubmit, getSession } from './auth.js';

        const session = await getSession();
        if (session) {
            window.location.href = '../products/list-products/list-products.html';
        }

        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', (e) => handleLoginSubmit(e));
        }

        // --- Toogle de Contraseña (Eye Icon) ---
        const togglePasswordBtn = document.querySelector('.toggle-password');
        const passwordInput = document.getElementById('admin-password');

        if (togglePasswordBtn && passwordInput) {
            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Cambia el color del ícono al presionarlo
                const eyeIcon = togglePasswordBtn.querySelector('svg');
                eyeIcon.style.color = type === 'text' ? '#16a34a' : '#a0a0a0';
            });
        }
    </script>
</body>

</html>
